language: objective-c
osx_image: xcode9.2
xcode_workspace: MAGE.xcworkspace
xcode_scheme: MAGE
xcode_sdk: iphonesimulator
matrix:
    include:
        - env: DESTINATION="platform=iOS Simulator,name=iPhone X,OS=11.2"
        - env: DESTINATION="platform=iOS Simulator,name=iPhone X,OS=10.3"
before_install:
    - gem install xcpretty
script:
    - set -o pipefail
    - xcodebuild -workspace $TRAVIS_XCODE_WORKSPACE -scheme $TRAVIS_XCODE_SCHEME -sdk $TRAVIS_XCODE_SDK -destination '$DESTINATION' build test | xcpretty
